name: Sweep overdue commitments
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Supabase sweep function
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "SUPABASE_PROJECT_REF secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SWEEP_SECRET }}" ]; then
            echo "SWEEP_SECRET secret is not set"
            exit 1
          fi
          SWEEP_URL="https://${{ secrets.SUPABASE_PROJECT_REF }}.functions.supabase.co/sweep_overdue_commitments"
          curl -sS -X POST "$SWEEP_URL" \
            -H "x-sweep-secret: ${{ secrets.SWEEP_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' || exit 1
