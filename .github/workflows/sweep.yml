name: Sweep overdue commitments
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Supabase sweep function
        env:
          SUPABASE_PROJECT_REF: your-project-ref-here
        run: |
          SWEEP_URL="https://<project-ref>.functions.supabase.co/sweep_overdue_commitments"
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY secret is not set"
            exit 1
          fi
          curl -sS -X POST "$SWEEP_URL" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' || exit 1
