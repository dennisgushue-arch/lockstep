apply plugin: 'com.android.application'

def signingProps = new Properties()
def signingPropsFile = rootProject.file('signing/release-signing.properties')
if (signingPropsFile.exists()) {
    signingPropsFile.withInputStream { signingProps.load(it) }
}

def envOrProp = { String envName, String propName ->
    return System.getenv(envName) ?: signingProps.getProperty(propName)
}

def releaseStoreFile = envOrProp('ANDROID_KEYSTORE_PATH', 'storeFile')
def releaseStorePassword = envOrProp('ANDROID_KEYSTORE_PASSWORD', 'storePassword')
def releaseKeyAlias = envOrProp('ANDROID_KEY_ALIAS', 'keyAlias')
def releaseKeyPassword = envOrProp('ANDROID_KEY_PASSWORD', 'keyPassword')
def hasReleaseSigning = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

def ciOrGradleProp = { String key ->
    return System.getenv(key) ?: (project.hasProperty(key) ? project.property(key)?.toString() : null)
}

def resolvedVersionCode = {
    // Preferred: CI-provided monotonic build number
    def explicitCode = ciOrGradleProp('ANDROID_VERSION_CODE')
    if (explicitCode) {
        return explicitCode.toInteger()
    }

    // Fallback: seconds since 2020-01-01 UTC, always increasing over time and safely < Int max
    long baseEpochSeconds = 1577836800L
    long nowEpochSeconds = (System.currentTimeMillis() / 1000L) as long
    int generatedCode = (nowEpochSeconds - baseEpochSeconds) as int

    if (generatedCode <= 0) {
        throw new RuntimeException('Generated ANDROID versionCode must be a positive integer.')
    }

    return generatedCode
}.call()

def resolvedVersionName = ciOrGradleProp('ANDROID_VERSION_NAME') ?: "1.0.${resolvedVersionCode}"

android {
    namespace "com.lockstep.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.lockstep.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolvedVersionCode
        versionName resolvedVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

if (!hasReleaseSigning) {
    logger.lifecycle('Release signing credentials not found. Set ANDROID_* env vars or create android/signing/release-signing.properties')
}
logger.lifecycle("Using app versionCode=${resolvedVersionCode}, versionName=${resolvedVersionName}")

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
